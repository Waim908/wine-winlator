_useExtraCrossToolChain="true"
# 以上设置为true才会使用此路径交叉编译工具链
_crossToolChainPath="$HOME/llvm_mingw"

# prefix=$_outputPath/ <= bin lib share
_outputPath="/tmp/output-wine/"

# 构建参数
_arm64ecConfigureArgs=(
  --with-mingw=clang \
  --enable-archs=arm64ec,aarch64,i386 \
  --enable-tools \
  --disable-tests \
  --host=aarch64-linux-gnu \
  host_alias=aarch64-linux-gnu \
  build_alias=x86_64-linux-gnu \
  --with-wine-tools=amd64 \
  --disable-win16 --disable-tests --without-capi --without-coreaudio --without-cups --without-gphoto --without-osmesa --without-oss --without-pcap --without-pcsclite --without-sane --without-udev --without-unwind --without-usb --without-v4l2 --without-wayland --without-xinerama --without-piper \
  CC=aarch64-linux-gnu-gcc
)

# 编译变量
_ARM64_CC="aarch64-linux-gnu-gcc"
_ARM64_CFLAGS="-O3 -pipe -ftree-vectorize -march=armv8-a -mtune=generic -Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types"
_ARM64_LDFLAGS="-Wl,--dynamic-linker=/data/data/com.winlator/files/imagefs/usr/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.winlator/files/imagefs/usr/lib -Wl,--sort-common,--as-needed,-s"

