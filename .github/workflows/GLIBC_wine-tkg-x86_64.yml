name: Compile Wine-TKG for x86_64 (Glibc) (env BCC ubuntu)

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Wine-TKG Version"
        required: false
        default: "10.15"

env:
  wineVer: ${{ github.event.inputs.version }}

jobs:
  build_wine:
    runs-on: ubuntu-24.04
    name: Build Wine-TKG
    steps:
      - name: Download Cache
        id: cache-tag
        uses: actions/cache@v4
        with:
          path: /tmp/ccache.tar.xz
          key: tkg-ccache-amd64

      - name: Build Wine-TKG & Download BCC
        run: |
          [[ -z $wineVer ]] && { echo "你没有输入Wine版本！" && exit 1;}
          git clone --depth 1 https://github.com/Waim908/wine-winlator.git || exit 1
          git clone --depth 1 https://github.com/Frogging-Family/wine-tkg-git.git || exit 1
          wget https://github.com/Waim908/BCC/releases/download/ubuntu2404-latest/ubuntu2404-latest.tar.xz || exit 1
          tar xf ubuntu2404-latest.tar.xz

      - name: Setting BCC & Compile Wine-TKG
        run: |
          echo $(pwd)
          sudo bash wine-winlator/mount.sh mount ubuntu2404
          sudo mkdir -p ubuntu2404/root/.cache/
          if [[ -f /tmp/ccache.tar.xz ]]; then
            echo "找到Ccache缓存，正在解压..."
            sudo tar -xf /tmp/ccache.tar.xz -C ubuntu2404/root/.cache/ || exit 1
          else
            echo "未找到Ccache缓存，继续..."
          fi
          sudo cp -r -p wine-winlator/ ubuntu2404/tmp/
          sudo cp -r -p wine-tkg-git/ ubuntu2404/tmp/
          sudo echo "export wineVer=${wineVer}" >> ubuntu2404/tmp/wineVer.conf


      - name: Compile
        run: |
          sudo chroot ubuntu2404 bash -x /tmp/wine-winlator/ubuntu.sh || exit 1
          sudo bash wine-winlator/mount.sh umount ubuntu2404
          sudo chmod 644 ubuntu2404/tmp/output-wcp/*.wcp
          sudo mv ubuntu2404/tmp/cache.tar.xz /tmp/
          sudo chmod 644 /tmp/cache.tar.xz
          mkdir -p /tmp/output-wcp/
          sudo mv ubuntu2404/tmp/output-wcp/*.wcp /tmp/output-wcp/
          sudo chmod 644 /tmp/output-wcp/*.wcp

      - name: Save ccache
        uses: actions/cache/save@v5
        with:
          path: /tmp/ccache.tar.xz
          key: tkg-ccache-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}-tkg
          name: Wine ${{ github.event.inputs.version }} TkG Staging GE for Winlator Glibc
          body: |
            自动编译版本。
            移植Proton MF
            启用Esync
            启用Fsync
            修改请查看此仓库源码。
          files: /tmp/output-wcp/*.wcp
          draft: false
          prerelease: false
